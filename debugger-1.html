<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeFix — Web Debugger</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Clash+Display:wght@600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #06060a;
  --panel: #0c0c12;
  --border: rgba(255,255,255,.07);
  --red: #ff3355;
  --yellow: #ffcc00;
  --green: #00ffaa;
  --blue: #4d9fff;
  --purple: #c47aff;
  --text: #e8e8f0;
  --dim: rgba(232,232,240,.35);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Mono', monospace;
  display: flex; flex-direction: column;
}

/* ── ANIMATED BG ───────────────────────────────── */
#bg {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  overflow: hidden;
}
.bg-orb {
  position: absolute; border-radius: 50%; filter: blur(80px);
  animation: orbFloat 8s ease-in-out infinite;
}
.bg-orb.a { width:500px;height:500px; background:rgba(255,51,85,.07); top:-100px;right:-100px; animation-duration:7s; }
.bg-orb.b { width:400px;height:400px; background:rgba(0,255,170,.05); bottom:-80px;left:-80px; animation-duration:9s;animation-delay:-3s; }
.bg-orb.c { width:300px;height:300px; background:rgba(77,159,255,.06); top:40%;left:40%; animation-duration:11s;animation-delay:-5s; }
@keyframes orbFloat { 0%,100%{transform:translate(0,0)} 33%{transform:translate(30px,-20px)} 66%{transform:translate(-20px,30px)} }

/* Scanlines */
#bg::after {
  content:''; position:absolute; inset:0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.03) 2px, rgba(0,0,0,.03) 4px);
  pointer-events:none;
}

/* ── HEADER ────────────────────────────────────── */
header {
  position: relative; z-index: 10;
  display: flex; align-items: center; gap: 1.5rem;
  padding: .65rem 1.5rem;
  border-bottom: 1px solid var(--border);
  background: rgba(6,6,10,.8);
  backdrop-filter: blur(20px);
  flex-shrink: 0;
}

.logo {
  font-family: 'Syne', sans-serif; font-weight: 800;
  font-size: 1.1rem; letter-spacing: -.02em;
  display: flex; align-items: center; gap: .5rem;
}
.logo-code { color: var(--green); }
.logo-fix  { color: var(--text); }
.logo-dot  {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--red);
  box-shadow: 0 0 10px var(--red);
  animation: pulse 1.8s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }

.lang-tabs {
  display: flex; gap: .25rem; margin-left: .5rem;
}
.lang-tab {
  font-family: 'Space Mono', monospace; font-size: .6rem;
  padding: .28rem .65rem; border-radius: 4px; cursor: pointer;
  border: 1px solid var(--border);
  color: var(--dim); background: none;
  letter-spacing: .08em; text-transform: uppercase;
  transition: all .2s;
}
.lang-tab:hover { color: var(--text); border-color: rgba(255,255,255,.2); }
.lang-tab.on { color: var(--bg); border-color: transparent; font-weight: 700; }
.lang-tab.html.on { background: var(--red); box-shadow: 0 0 16px rgba(255,51,85,.35); }
.lang-tab.css.on  { background: var(--blue); box-shadow: 0 0 16px rgba(77,159,255,.35); }
.lang-tab.js.on   { background: var(--yellow); box-shadow: 0 0 16px rgba(255,204,0,.35); color:#000; }

.hdr-right { margin-left: auto; display: flex; align-items: center; gap: .75rem; }

.run-btn {
  display: flex; align-items: center; gap: .5rem;
  font-family: 'Space Mono', monospace; font-size: .68rem;
  font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
  padding: .45rem 1.2rem; border: none; border-radius: 5px;
  cursor: pointer; transition: all .25s;
  background: var(--green); color: #000;
  box-shadow: 0 0 20px rgba(0,255,170,.3);
}
.run-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 30px rgba(0,255,170,.5); }
.run-btn:active { transform: scale(.97); }
.run-btn .ico { font-size: .9rem; }

.clear-btn {
  background: none; border: 1px solid var(--border);
  border-radius: 5px; padding: .45rem .8rem;
  color: var(--dim); cursor: pointer; font-family: 'Space Mono', monospace;
  font-size: .6rem; letter-spacing: .08em; transition: all .2s;
}
.clear-btn:hover { border-color: rgba(255,255,255,.2); color: var(--text); }

/* ── MAIN LAYOUT ───────────────────────────────── */
#main {
  flex: 1; display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr auto;
  overflow: hidden;
  position: relative; z-index: 1;
}

/* ── EDITOR PANEL ──────────────────────────────── */
#editor-panel {
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}

.panel-header {
  display: flex; align-items: center; gap: .6rem;
  padding: .55rem 1rem;
  border-bottom: 1px solid var(--border);
  background: var(--panel);
  flex-shrink: 0;
}
.panel-title {
  font-size: .6rem; color: var(--dim);
  letter-spacing: .14em; text-transform: uppercase;
}
.panel-badge {
  margin-left: auto; font-size: .58rem;
  padding: .15rem .5rem; border-radius: 20px;
  font-family: 'Space Mono', monospace; letter-spacing: .06em;
}

/* Code editor area */
#editor-wrap {
  flex: 1; display: flex; overflow: hidden;
  position: relative;
}
#line-nums {
  width: 42px; padding: .875rem .5rem .875rem 0;
  text-align: right; flex-shrink: 0;
  background: rgba(0,0,0,.2);
  border-right: 1px solid var(--border);
  overflow: hidden; user-select: none;
  font-size: .72rem; line-height: 1.65rem;
  color: rgba(255,255,255,.12);
}
#code-input {
  flex: 1; padding: .875rem 1rem;
  background: transparent; border: none; outline: none; resize: none;
  color: var(--text); font-family: 'Space Mono', monospace;
  font-size: .72rem; line-height: 1.65rem;
  tab-size: 2; overflow-y: auto; overflow-x: auto;
  white-space: pre; scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,.08) transparent;
  caret-color: var(--green);
}
#code-input::selection { background: rgba(0,255,170,.12); }

/* ── RESULTS PANEL ─────────────────────────────── */
#results-panel {
  display: flex; flex-direction: column; overflow: hidden;
  background: var(--bg);
}

/* Hero counter */
#counter-hero {
  padding: 1.5rem 1.5rem 1rem;
  display: flex; gap: 1rem; flex-shrink: 0;
}
.counter-card {
  flex: 1; padding: 1rem; border-radius: 8px;
  border: 1px solid; position: relative; overflow: hidden;
  transition: transform .2s;
}
.counter-card:hover { transform: translateY(-2px); }
.counter-card::before {
  content: ''; position: absolute; inset: 0; opacity: .06;
}
.counter-card.err  { border-color: rgba(255,51,85,.3); }
.counter-card.warn { border-color: rgba(255,204,0,.3); }
.counter-card.ok   { border-color: rgba(0,255,170,.3); }
.counter-card.err::before  { background: var(--red); }
.counter-card.warn::before { background: var(--yellow); }
.counter-card.ok::before   { background: var(--green); }
.cc-num {
  font-family: 'Syne', sans-serif; font-size: 2.2rem; font-weight: 800;
  line-height: 1;
}
.counter-card.err  .cc-num { color: var(--red); text-shadow: 0 0 20px rgba(255,51,85,.5); }
.counter-card.warn .cc-num { color: var(--yellow); text-shadow: 0 0 20px rgba(255,204,0,.4); }
.counter-card.ok   .cc-num { color: var(--green); text-shadow: 0 0 20px rgba(0,255,170,.4); }
.cc-lbl { font-size: .58rem; color: var(--dim); letter-spacing: .1em; text-transform: uppercase; margin-top: .25rem; }

/* Error list */
#errors-wrap {
  flex: 1; overflow-y: auto; padding: 0 1.5rem 1rem;
  scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.08) transparent;
}

.error-item {
  display: flex; gap: .875rem; align-items: flex-start;
  padding: .875rem; margin-bottom: .5rem;
  border-radius: 8px; border: 1px solid;
  animation: slideIn .3s cubic-bezier(.22,1,.36,1);
  cursor: default; transition: transform .15s;
  position: relative; overflow: hidden;
}
.error-item:hover { transform: translateX(4px); }
.error-item::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; }
@keyframes slideIn { from{opacity:0;transform:translateX(-10px)} to{opacity:1;transform:translateX(0)} }

.error-item.error  { background: rgba(255,51,85,.05);  border-color: rgba(255,51,85,.2); }
.error-item.warn   { background: rgba(255,204,0,.05);  border-color: rgba(255,204,0,.2); }
.error-item.info   { background: rgba(77,159,255,.05); border-color: rgba(77,159,255,.2); }
.error-item.error::before  { background: var(--red); }
.error-item.warn::before   { background: var(--yellow); }
.error-item.info::before   { background: var(--blue); }

.ei-icon { font-size: 1rem; flex-shrink: 0; margin-top: .05rem; }
.ei-body { flex: 1; min-width: 0; }
.ei-title { font-size: .75rem; font-weight: 700; margin-bottom: .2rem; }
.error-item.error .ei-title { color: var(--red); }
.error-item.warn  .ei-title { color: var(--yellow); }
.error-item.info  .ei-title { color: var(--blue); }
.ei-desc  { font-size: .65rem; color: var(--dim); line-height: 1.6; }
.ei-line  {
  flex-shrink: 0; font-size: .58rem; letter-spacing: .06em;
  padding: .15rem .45rem; border-radius: 4px;
  background: rgba(255,255,255,.06); color: var(--dim);
}

/* Empty state */
#empty-state {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; flex: 1; gap: 1rem;
  color: var(--dim); text-align: center; padding: 2rem;
}
.empty-icon { font-size: 3rem; opacity: .3; }
.empty-title { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; color: rgba(255,255,255,.2); }
.empty-sub { font-size: .65rem; color: rgba(255,255,255,.15); line-height: 1.7; letter-spacing: .04em; }

/* ── BOTTOM BAR ─────────────────────────────────── */
#bottom-bar {
  grid-column: 1/-1;
  display: flex; align-items: center; gap: 1rem;
  padding: .45rem 1.2rem;
  border-top: 1px solid var(--border);
  background: rgba(6,6,10,.9);
  backdrop-filter: blur(10px);
  font-size: .58rem; color: var(--dim);
  letter-spacing: .08em; flex-shrink: 0;
}
.status-dot { width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green); }
.kbd { background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:3px;padding:.1rem .35rem;color:rgba(255,255,255,.3);font-size:.56rem; }
#char-count { margin-left: auto; }

/* ── PREVIEW (bottom of results when HTML) ──────── */
#preview-wrap {
  border-top: 1px solid var(--border);
  flex-shrink: 0; height: 0; overflow: hidden;
  transition: height .3s ease;
}
#preview-wrap.open { height: 180px; }
.preview-header {
  display: flex; align-items: center; gap: .5rem;
  padding: .4rem .875rem; background: var(--panel);
  font-size: .58rem; color: var(--dim); letter-spacing: .1em;
}
#preview-frame {
  width: 100%; height: calc(100% - 28px);
  border: none; background: #fff;
}

/* ── SCROLLBAR ─────────────────────────────────── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,.08); border-radius: 4px; }

/* ── MOBILE ────────────────────────────────────── */
@media(max-width:700px){
  #main { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr auto; }
  #editor-panel { border-right: none; border-bottom: 1px solid var(--border); }
  .counter-card .cc-num { font-size: 1.5rem; }
  #counter-hero { padding: .875rem; gap: .5rem; }
}
</style>
</head>
<body>

<div id="bg">
  <div class="bg-orb a"></div>
  <div class="bg-orb b"></div>
  <div class="bg-orb c"></div>
</div>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-dot"></div>
    <span class="logo-code">Code</span><span class="logo-fix">Fix</span>
  </div>

  <div class="lang-tabs">
    <button class="lang-tab html on" data-lang="html" onclick="setLang('html')">HTML</button>
    <button class="lang-tab css"  data-lang="css"  onclick="setLang('css')">CSS</button>
    <button class="lang-tab js"   data-lang="js"   onclick="setLang('js')">JS</button>
  </div>

  <div class="hdr-right">
    <button class="clear-btn" onclick="clearAll()">Limpiar</button>
    <button class="run-btn" onclick="analyze()">
      <span class="ico">⚡</span> Analizar
    </button>
  </div>
</header>

<!-- MAIN -->
<div id="main">

  <!-- EDITOR -->
  <div id="editor-panel">
    <div class="panel-header">
      <span class="panel-title" id="editor-label">editor — html</span>
      <span class="panel-badge" id="lang-badge" style="background:rgba(255,51,85,.15);color:#ff3355;border:1px solid rgba(255,51,85,.25)">HTML</span>
    </div>
    <div id="editor-wrap">
      <div id="line-nums">1</div>
      <textarea id="code-input"
        placeholder="Pega tu código aquí..."
        spellcheck="false"
        autocorrect="off"
        autocapitalize="off"
        oninput="onInput()"
        onkeydown="onKey(event)"
        onscroll="syncScroll()"
      ></textarea>
    </div>
  </div>

  <!-- RESULTS -->
  <div id="results-panel">
    <div class="panel-header">
      <span class="panel-title">resultados</span>
      <span class="panel-badge" id="total-badge" style="background:rgba(255,255,255,.06);color:rgba(255,255,255,.3);border:1px solid rgba(255,255,255,.1)">—</span>
    </div>

    <div id="counter-hero">
      <div class="counter-card err">
        <div class="cc-num" id="cnt-err">0</div>
        <div class="cc-lbl">Errores</div>
      </div>
      <div class="counter-card warn">
        <div class="cc-num" id="cnt-warn">0</div>
        <div class="cc-lbl">Avisos</div>
      </div>
      <div class="counter-card ok">
        <div class="cc-num" id="cnt-ok">0</div>
        <div class="cc-lbl">OK</div>
      </div>
    </div>

    <div id="errors-wrap">
      <div id="empty-state">
        <div class="empty-icon">⚡</div>
        <div class="empty-title">Listo para analizar</div>
        <div class="empty-sub">Pega tu código HTML, CSS o JS<br>y pulsa Analizar</div>
      </div>
    </div>

    <div id="preview-wrap">
      <div class="preview-header">
        <span>◉</span> vista previa html
      </div>
      <iframe id="preview-frame" sandbox="allow-scripts"></iframe>
    </div>
  </div>

  <!-- BOTTOM BAR -->
  <div id="bottom-bar">
    <div class="status-dot"></div>
    <span>CodeFix by Álvaro Zambianchi</span>
    <span><kbd class="kbd">Ctrl</kbd>+<kbd class="kbd">Enter</kbd> para analizar</span>
    <span id="char-count">0 caracteres</span>
  </div>

</div>

<script>
// ── STATE ──────────────────────────────────────────────────
let lang = 'html';

const SAMPLES = {
  html: `<!DOCTYPE html>
<html>
<head>
  <title>Mi página</title>
</head>
<body>
  <h1>Hola mundo</h1>
  <p>Este es un párrafo sin cerrar
  <div>
    <img src="foto.jpg">
    <a href="">Enlace vacío</a>
  </div>
  <p>Otro párrafo
  <SPAN>Etiqueta en mayúscula</SPAN>
  <div>
</body>
</html>`,
  css: `body {
  background: #fff
  color: #333;
  font-family: Arial;
}

.container {
  width: 100%%;
  margn-left: auto;
  margin-right: auto;
  display: blok;
  border: 1px solidd red;
}

h1 {
  font-size 24px;
  colour: blue;
}`,
  js: `funcion saludar(nombre) {
  consol.log("Hola " + nombre)
}

var x = 10
var x = 20

if (x > 5 {
  console.log("mayor")
}

document.getElementByid('btn').addEventListener('click', function() {
  alert('clicked'
})`
};

// ── LANG SWITCH ───────────────────────────────────────────
function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-tab').forEach(t => t.classList.toggle('on', t.dataset.lang === l));
  document.getElementById('editor-label').textContent = `editor — ${l}`;

  const colors = { html:['rgba(255,51,85,.15)','#ff3355','rgba(255,51,85,.25)'], css:['rgba(77,159,255,.15)','#4d9fff','rgba(77,159,255,.25)'], js:['rgba(255,204,0,.15)','#ffcc00','rgba(255,204,0,.25)'] };
  const [bg, col, brd] = colors[l];
  const badge = document.getElementById('lang-badge');
  badge.style.background = bg; badge.style.color = col; badge.style.border = `1px solid ${brd}`;
  badge.textContent = l.toUpperCase();

  // Show/hide preview
  document.getElementById('preview-wrap').classList.toggle('open', l === 'html');

  // Load sample
  const inp = document.getElementById('code-input');
  inp.value = SAMPLES[l] || '';
  onInput();
  resetResults();
}

// ── INPUT ─────────────────────────────────────────────────
function onInput() {
  const code = document.getElementById('code-input').value;
  updateLineNums(code);
  document.getElementById('char-count').textContent = code.length + ' caracteres';
}

function updateLineNums(code) {
  const lines = (code.match(/\n/g)||[]).length + 1;
  document.getElementById('line-nums').textContent = Array.from({length:lines},(_,i)=>i+1).join('\n');
}

function syncScroll() {
  const inp = document.getElementById('code-input');
  document.getElementById('line-nums').scrollTop = inp.scrollTop;
}

function onKey(e) {
  if((e.ctrlKey||e.metaKey) && e.key==='Enter') { e.preventDefault(); analyze(); }
  if(e.key==='Tab') {
    e.preventDefault();
    const inp = e.target, s = inp.selectionStart, en = inp.selectionEnd;
    inp.value = inp.value.slice(0,s) + '  ' + inp.value.slice(en);
    inp.selectionStart = inp.selectionEnd = s + 2;
    onInput();
  }
}

function clearAll() {
  document.getElementById('code-input').value = '';
  onInput(); resetResults();
  document.getElementById('preview-frame').srcdoc = '';
}

// ── ANALYZE ───────────────────────────────────────────────
function analyze() {
  const code = document.getElementById('code-input').value.trim();
  if(!code) { resetResults(); return; }

  let errors = [];
  if(lang === 'html') errors = analyzeHTML(code);
  if(lang === 'css')  errors = analyzeCSS(code);
  if(lang === 'js')   errors = analyzeJS(code);

  renderResults(errors);

  if(lang === 'html') {
    document.getElementById('preview-frame').srcdoc = code;
  }
}

// ── HTML ANALYZER ─────────────────────────────────────────
function analyzeHTML(code) {
  const errors = [];
  const lines = code.split('\n');

  // Stack for tag matching
  const voidTags = new Set(['area','base','br','col','embed','hr','img','input','link','meta','param','source','track','wbr']);
  const stack = [];
  const tagRe = /<\/?([a-zA-Z][a-zA-Z0-9]*)[^>]*>/g;
  let m;

  // Check for DOCTYPE
  if(!/<!DOCTYPE/i.test(code)) {
    errors.push({type:'warn', icon:'⚠️', title:'Falta DOCTYPE', desc:'Se recomienda incluir <!DOCTYPE html> al inicio del documento para asegurar compatibilidad.', line:1});
  }

  // Check unclosed/mismatched tags
  lines.forEach((line, li) => {
    const lineNum = li + 1;

    // Uppercase tags
    const upperMatch = line.match(/<([A-Z][A-Z0-9]*)/);
    if(upperMatch) {
      errors.push({type:'warn', icon:'⚠️', title:`Etiqueta en mayúsculas: <${upperMatch[1]}>`, desc:`HTML5 recomienda usar etiquetas en minúsculas. Usa <${upperMatch[1].toLowerCase()}> en su lugar.`, line:lineNum});
    }

    // Empty href/src
    if(/href\s*=\s*["']\s*["']/.test(line)) {
      errors.push({type:'warn', icon:'⚠️', title:'Atributo href vacío', desc:'Un enlace <a> con href="" puede causar comportamiento inesperado. Añade una URL o usa href="#".', line:lineNum});
    }
    if(/<img[^>]*>/.test(line) && !/alt\s*=/.test(line)) {
      errors.push({type:'warn', icon:'⚠️', title:'Imagen sin atributo alt', desc:'Las imágenes deben tener un atributo alt para accesibilidad y SEO.', line:lineNum});
    }

    // Parse open/close tags
    const re2 = /<\/?([a-zA-Z][a-zA-Z0-9]*)[^>]*>/g;
    let m2;
    while((m2 = re2.exec(line)) !== null) {
      const full = m2[0], tag = m2[1].toLowerCase();
      if(voidTags.has(tag)) continue;
      if(full.startsWith('</')) {
        if(stack.length === 0 || stack[stack.length-1].tag !== tag) {
          errors.push({type:'error', icon:'🔴', title:`Etiqueta </${tag}> sin abrir`, desc:`Se encontró una etiqueta de cierre </${tag}> sin su correspondiente etiqueta de apertura.`, line:lineNum});
        } else {
          stack.pop();
        }
      } else if(!full.endsWith('/>') && !full.includes('!')) {
        stack.push({tag, line:lineNum});
      }
    }
  });

  // Remaining unclosed
  stack.forEach(({tag, line}) => {
    errors.push({type:'error', icon:'🔴', title:`Etiqueta <${tag}> no cerrada`, desc:`La etiqueta <${tag}> en la línea ${line} nunca se cierra con </${tag}>.`, line});
  });

  // Missing head/body
  if(/<html/i.test(code) && !/<head/i.test(code)) errors.push({type:'warn',icon:'⚠️',title:'Falta <head>',desc:'El documento HTML debería incluir una sección <head> con metadatos.',line:1});
  if(/<html/i.test(code) && !/<body/i.test(code)) errors.push({type:'warn',icon:'⚠️',title:'Falta <body>',desc:'El documento HTML debería incluir una sección <body>.',line:1});
  if(!/<title/i.test(code)) errors.push({type:'warn',icon:'⚠️',title:'Falta <title>',desc:'Todo documento HTML debería tener un elemento <title> dentro del <head>.',line:1});
  if(!/<meta[^>]+charset/i.test(code)) errors.push({type:'info',icon:'💡',title:'Sin charset declarado',desc:'Agrega <meta charset="UTF-8"> dentro del <head> para evitar problemas con caracteres especiales.',line:1});

  if(errors.length === 0) errors.push({type:'info',icon:'✅',title:'HTML sin errores detectados',desc:'No se encontraron problemas. El código parece correcto.',line:null});

  return errors;
}

// ── CSS ANALYZER ──────────────────────────────────────────
function analyzeCSS(code) {
  const errors = [];
  const lines = code.split('\n');

  const validProps = new Set(['color','background','background-color','background-image','background-size','background-position','border','border-top','border-bottom','border-left','border-right','border-radius','border-color','border-width','border-style','margin','margin-top','margin-bottom','margin-left','margin-right','padding','padding-top','padding-bottom','padding-left','padding-right','width','height','max-width','max-height','min-width','min-height','display','flex','flex-direction','flex-wrap','justify-content','align-items','align-self','gap','grid','grid-template-columns','grid-template-rows','position','top','bottom','left','right','z-index','font','font-size','font-family','font-weight','font-style','line-height','letter-spacing','text-align','text-decoration','text-transform','overflow','overflow-x','overflow-y','opacity','visibility','transform','transition','animation','box-shadow','text-shadow','cursor','pointer-events','content','list-style','outline','float','clear','vertical-align','white-space','word-break','object-fit','resize','appearance','user-select','box-sizing','columns','column-gap','row-gap','order','flex-grow','flex-shrink','flex-basis','place-items','place-content','aspect-ratio','filter','backdrop-filter','clip-path','mask','scroll-behavior','accent-color','caret-color']);

  let braceCount = 0;
  let inRule = false;

  lines.forEach((line, li) => {
    const ln = li + 1;
    const trimmed = line.trim();
    if(!trimmed || trimmed.startsWith('/*')) return;

    braceCount += (line.match(/{/g)||[]).length;
    braceCount -= (line.match(/}/g)||[]).length;

    // Detect property lines (inside rules)
    if(trimmed.includes(':') && !trimmed.includes('{') && !trimmed.includes('}') && !trimmed.startsWith('//')) {
      const [rawProp, ...valParts] = trimmed.split(':');
      const prop = rawProp.trim().toLowerCase();
      const val = valParts.join(':').trim();

      // Missing semicolon
      if(val && !val.endsWith(';') && !val.endsWith('{') && !val.endsWith('}')) {
        errors.push({type:'error',icon:'🔴',title:`Falta punto y coma`,desc:`La propiedad "${prop}" no termina en punto y coma (;). Esto puede romper las reglas siguientes.`,line:ln});
      }

      // Unknown property
      if(prop && !prop.startsWith('-') && !prop.startsWith('--') && !validProps.has(prop)) {
        // Suggest typo fixes
        let suggestion = '';
        if(prop === 'margn-left'||prop==='marign-left') suggestion = ' ¿Quisiste decir margin-left?';
        if(prop === 'colour') suggestion = ' ¿Quisiste decir color?';
        if(prop === 'backgroud'||prop==='backround') suggestion = ' ¿Quisiste decir background?';
        if(prop === 'paddin'||prop==='pading') suggestion = ' ¿Quisiste decir padding?';
        if(prop === 'heigth') suggestion = ' ¿Quisiste decir height?';
        if(prop === 'widht') suggestion = ' ¿Quisiste decir width?';
        errors.push({type:'error',icon:'🔴',title:`Propiedad desconocida: "${prop}"`,desc:`La propiedad CSS "${prop}" no es válida.${suggestion}`,line:ln});
      }

      // Double % or invalid values
      if(val && val.includes('%%')) {
        errors.push({type:'error',icon:'🔴',title:'Valor inválido: "%%"',desc:'Se encontró "%%" en lugar de "%". Usa un solo símbolo de porcentaje.',line:ln});
      }

      // Invalid display value
      if(prop==='display' && val) {
        const v = val.replace(';','').trim();
        const validDisplays = new Set(['block','inline','inline-block','flex','grid','none','table','inline-flex','inline-grid','contents','flow-root','list-item']);
        if(!validDisplays.has(v)) {
          errors.push({type:'error',icon:'🔴',title:`Valor de display inválido: "${v}"`,desc:`"${v}" no es un valor válido para display. Valores comunes: block, flex, grid, none, inline.`,line:ln});
        }
      }
    }

    // Font-size without unit
    const fsMatch = line.match(/font-size\s*:\s*(\d+)\s*;/);
    if(fsMatch) {
      errors.push({type:'warn',icon:'⚠️',title:`font-size sin unidad: ${fsMatch[1]}`,desc:`El valor ${fsMatch[1]} no tiene unidad (px, rem, em). Se usará 0 en la mayoría de navegadores.`,line:ln});
    }
  });

  // Unclosed braces
  if(braceCount > 0) errors.push({type:'error',icon:'🔴',title:`${braceCount} llave(s) sin cerrar`,desc:'Hay llaves { abiertas que no se han cerrado. Revisa que cada selector tenga su par de llaves.',line:null});
  if(braceCount < 0) errors.push({type:'error',icon:'🔴',title:`${Math.abs(braceCount)} llave(s) de más`,desc:'Hay llaves } de cierre sin su apertura correspondiente.',line:null});

  if(errors.length === 0) errors.push({type:'info',icon:'✅',title:'CSS sin errores detectados',desc:'No se encontraron problemas. El código parece correcto.',line:null});
  return errors;
}

// ── JS ANALYZER ───────────────────────────────────────────
function analyzeJS(code) {
  const errors = [];
  const lines = code.split('\n');

  // Try native parse
  try {
    new Function(code);
  } catch(e) {
    errors.push({type:'error',icon:'🔴',title:'Error de sintaxis JavaScript',desc:e.message,line:null});
  }

  lines.forEach((line, li) => {
    const ln = li + 1;
    const trimmed = line.trim();
    if(!trimmed || trimmed.startsWith('//')) return;

    // Common typos
    if(/\bfuncion\b/.test(trimmed)) errors.push({type:'error',icon:'🔴',title:'Palabra clave incorrecta: "funcion"',desc:'En JavaScript se escribe "function" (sin acento).', line:ln});
    if(/\bconsol\.log\b/.test(trimmed)) errors.push({type:'error',icon:'🔴',title:'Typo: "consol.log"',desc:'La función correcta es "console.log" (con e al final).', line:ln});
    if(/\bdocument\.getElementByid\b/.test(trimmed)) errors.push({type:'error',icon:'🔴',title:'Typo: "getElementByid"',desc:'El método correcto es "getElementById" (la I de Id va en mayúscula).', line:ln});
    if(/\bgetElementsByClassName\b/.test(trimmed) && !/document\./.test(trimmed)) errors.push({type:'warn',icon:'⚠️',title:'getElementsByClassName sin document',desc:'Este método debe llamarse desde document: document.getElementsByClassName(...)',line:ln});

    // var redeclaration (simple check)
    const varMatch = trimmed.match(/^var\s+([a-zA-Z_$][a-zA-Z0-9_$]*)/);
    if(varMatch) {
      const varName = varMatch[1];
      const prevLines = lines.slice(0, li).join('\n');
      if(new RegExp(`\\bvar\\s+${varName}\\b`).test(prevLines)) {
        errors.push({type:'warn',icon:'⚠️',title:`Variable "${varName}" declarada dos veces`,desc:`Usar "var" permite redeclarar variables, lo que puede causar bugs. Considera usar "let" o "const".`,line:ln});
      }
    }

    // == vs ===
    if(/[^=!<>]==[^=]/.test(trimmed) && !/===/g.test(trimmed)) {
      errors.push({type:'warn',icon:'⚠️',title:'Comparación débil (==)',desc:'Usa === en lugar de == para comparación estricta y evitar conversiones de tipo inesperadas.',line:ln});
    }

    // Missing semicolon on statement lines
    const noSemiNeeded = /^\s*(if|else|for|while|function|class|switch|try|catch|{|}|\/\/)/.test(trimmed);
    if(!noSemiNeeded && !trimmed.endsWith(';') && !trimmed.endsWith('{') && !trimmed.endsWith('}') && !trimmed.endsWith(',') && trimmed.length > 2 && !trimmed.startsWith('//')) {
      // Only flag obvious statement endings
      if(/^(var|let|const|return|console|document|window|alert)\b/.test(trimmed)) {
        errors.push({type:'info',icon:'💡',title:'Posible punto y coma faltante',desc:'Aunque JavaScript a veces inserta puntos y coma automáticamente (ASI), es buena práctica añadirlos explícitamente.',line:ln});
      }
    }

    // console.log left in code
    if(/console\.log/.test(trimmed)) {
      errors.push({type:'info',icon:'💡',title:'console.log en producción',desc:'Recuerda eliminar los console.log antes de subir a producción.',line:ln});
    }
  });

  if(errors.filter(e=>e.type==='error').length === 0 && errors.filter(e=>e.type==='warn').length === 0) {
    errors.push({type:'info',icon:'✅',title:'JavaScript sin errores críticos',desc:'No se encontraron errores de sintaxis graves.',line:null});
  }
  return errors;
}

// ── RENDER RESULTS ─────────────────────────────────────────
function renderResults(errors) {
  const errs  = errors.filter(e=>e.type==='error').length;
  const warns = errors.filter(e=>e.type==='warn').length;
  const oks   = errors.filter(e=>e.type==='info').length;

  document.getElementById('cnt-err').textContent  = errs;
  document.getElementById('cnt-warn').textContent = warns;
  document.getElementById('cnt-ok').textContent   = oks;

  const total = errors.length;
  const badge = document.getElementById('total-badge');
  badge.textContent = total + ' resultado' + (total!==1?'s':'');
  if(errs > 0) { badge.style.background='rgba(255,51,85,.15)'; badge.style.color='#ff3355'; badge.style.border='1px solid rgba(255,51,85,.25)'; }
  else if(warns > 0) { badge.style.background='rgba(255,204,0,.15)'; badge.style.color='#ffcc00'; badge.style.border='1px solid rgba(255,204,0,.25)'; }
  else { badge.style.background='rgba(0,255,170,.1)'; badge.style.color='#00ffaa'; badge.style.border='1px solid rgba(0,255,170,.2)'; }

  const wrap = document.getElementById('errors-wrap');
  if(!errors.length) { wrap.innerHTML=''; return; }

  wrap.innerHTML = errors.map((e, i) => `
    <div class="error-item ${e.type}" style="animation-delay:${i*0.04}s">
      <span class="ei-icon">${e.icon}</span>
      <div class="ei-body">
        <div class="ei-title">${e.title}</div>
        <div class="ei-desc">${e.desc}</div>
      </div>
      ${e.line ? `<span class="ei-line">línea ${e.line}</span>` : ''}
    </div>
  `).join('');
}

function resetResults() {
  document.getElementById('cnt-err').textContent = '0';
  document.getElementById('cnt-warn').textContent = '0';
  document.getElementById('cnt-ok').textContent = '0';
  const badge = document.getElementById('total-badge');
  badge.textContent = '—'; badge.style.background='rgba(255,255,255,.06)'; badge.style.color='rgba(255,255,255,.3)'; badge.style.border='1px solid rgba(255,255,255,.1)';
  document.getElementById('errors-wrap').innerHTML = `
    <div id="empty-state">
      <div class="empty-icon">⚡</div>
      <div class="empty-title">Listo para analizar</div>
      <div class="empty-sub">Pega tu código HTML, CSS o JS<br>y pulsa Analizar</div>
    </div>`;
}
