<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PixelArt Studio</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body {
  background:#0a0a0f; color:#888;
  font-family:'DM Mono', monospace; font-weight:300;
  font-size:.68rem; letter-spacing:.04em;
  display:flex; flex-direction:column; user-select:none;
}
#bar {
  height:38px; display:flex; align-items:center;
  padding:0 1rem; gap:1.2rem;
  border-bottom:1px solid rgba(255,255,255,.05); flex-shrink:0;
}
.bar-logo { color:rgba(255,255,255,.3); font-size:.7rem; letter-spacing:.14em; text-transform:uppercase; flex-shrink:0; }
.bdiv { width:1px; height:14px; background:rgba(255,255,255,.06); }
.bb2 {
  background:none; border:none; cursor:pointer;
  color:rgba(255,255,255,.18); padding:.2rem .4rem; border-radius:3px;
  font-family:'DM Mono',monospace; font-size:.6rem; letter-spacing:.06em;
  transition:color .15s, background .15s; white-space:nowrap;
}
.bb2:hover { color:rgba(255,255,255,.6); background:rgba(255,255,255,.04); }
.bb2.on { color:rgba(255,255,255,.45); }
.bex {
  background:none; border:1px solid rgba(255,255,255,.09);
  border-radius:3px; padding:.2rem .6rem;
  color:rgba(255,255,255,.28); cursor:pointer;
  font-family:'DM Mono',monospace; font-size:.6rem;
  letter-spacing:.08em; text-transform:uppercase; transition:all .2s;
}
.bex:hover { border-color:rgba(255,255,255,.28); color:rgba(255,255,255,.65); }
.bml { margin-left:auto; }

#layout { flex:1; display:flex; overflow:hidden; }

#tools {
  width:38px; display:flex; flex-direction:column;
  align-items:center; padding:.5rem 0; gap:.12rem;
  border-right:1px solid rgba(255,255,255,.05); flex-shrink:0;
}
.t {
  width:28px; height:28px; background:none; border:none; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  border-radius:4px; color:rgba(255,255,255,.16); font-size:.85rem;
  transition:all .15s; position:relative;
}
.t:hover { color:rgba(255,255,255,.5); background:rgba(255,255,255,.04); }
.t.on { color:rgba(255,255,255,.75); background:rgba(255,255,255,.07); }
.tdiv { width:16px; height:1px; background:rgba(255,255,255,.05); margin:.2rem 0; }
.t::after {
  content:attr(data-tip); position:absolute; left:calc(100% + 8px); top:50%;
  transform:translateY(-50%); background:#111118;
  border:1px solid rgba(255,255,255,.07); color:rgba(255,255,255,.45);
  font-size:.57rem; padding:.2rem .5rem; border-radius:3px;
  white-space:nowrap; pointer-events:none; opacity:0; transition:opacity .1s; z-index:999;
}
.t:hover::after { opacity:1; }

#area {
  flex:1; display:flex; align-items:center; justify-content:center;
  overflow:hidden; position:relative; background:#0a0a0f;
}
#area::before {
  content:''; position:absolute; inset:0; pointer-events:none;
  background-image:radial-gradient(rgba(255,255,255,.025) 1px, transparent 1px);
  background-size:24px 24px;
}
#wrap { position:relative; }
#px { display:block; image-rendering:pixelated; }
#gv { position:absolute; inset:0; pointer-events:none; image-rendering:pixelated; }

#zhud {
  position:absolute; bottom:.75rem; left:50%; transform:translateX(-50%);
  display:flex; align-items:center; gap:.4rem;
}
.zb {
  background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.07);
  border-radius:3px; width:20px; height:20px;
  color:rgba(255,255,255,.22); cursor:pointer; font-size:.8rem;
  display:flex; align-items:center; justify-content:center;
  transition:all .15s; font-family:'DM Mono',monospace;
}
.zb:hover { color:rgba(255,255,255,.55); }
#zlbl { font-size:.6rem; color:rgba(255,255,255,.18); min-width:26px; text-align:center; }
#coord { position:absolute; bottom:.75rem; right:1rem; font-size:.57rem; color:rgba(255,255,255,.13); }

#panel {
  width:168px; border-left:1px solid rgba(255,255,255,.05);
  display:flex; flex-direction:column; overflow-y:auto; scrollbar-width:none; flex-shrink:0;
}
#panel::-webkit-scrollbar { display:none; }
.ps { padding:.7rem; border-bottom:1px solid rgba(255,255,255,.04); }
.pl { font-size:.53rem; color:rgba(255,255,255,.16); letter-spacing:.14em; text-transform:uppercase; margin-bottom:.55rem; }

#col-box {
  width:100%; height:30px; border-radius:3px; cursor:pointer;
  border:1px solid rgba(255,255,255,.07); margin-bottom:.45rem; transition:opacity .15s;
}
#col-box:hover { opacity:.8; }
#hexinp {
  width:100%; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.06);
  border-radius:3px; padding:.28rem .45rem; color:rgba(255,255,255,.4);
  font-family:'DM Mono',monospace; font-size:.63rem; outline:none; transition:border-color .15s;
}
#hexinp:focus { border-color:rgba(255,255,255,.18); color:rgba(255,255,255,.65); }
#native { display:none; }

#opslider { width:100%; accent-color:rgba(255,255,255,.3); cursor:pointer; height:2px; }

#palg { display:grid; grid-template-columns:repeat(6,1fr); gap:3px; }
.pc {
  aspect-ratio:1; border-radius:2px; cursor:pointer;
  border:1.5px solid transparent; transition:transform .12s, border-color .12s;
}
.pc:hover { transform:scale(1.15); z-index:1; position:relative; }
.pc.sel { border-color:rgba(255,255,255,.55); }

#brushg { display:flex; gap:.3rem; flex-wrap:wrap; }
.bsz {
  background:none; border:1px solid rgba(255,255,255,.07);
  border-radius:3px; padding:.2rem .4rem; color:rgba(255,255,255,.22);
  cursor:pointer; font-family:'DM Mono',monospace; font-size:.58rem; transition:all .15s;
}
.bsz:hover { color:rgba(255,255,255,.55); border-color:rgba(255,255,255,.2); }
.bsz.on { color:rgba(255,255,255,.65); border-color:rgba(255,255,255,.3); }

#sizes { display:flex; gap:.3rem; flex-wrap:wrap; }
.csz {
  background:none; border:1px solid rgba(255,255,255,.07);
  border-radius:3px; padding:.2rem .4rem; color:rgba(255,255,255,.2);
  cursor:pointer; font-family:'DM Mono',monospace; font-size:.58rem; transition:all .15s;
}
.csz:hover { color:rgba(255,255,255,.5); }
.csz.on { color:rgba(255,255,255,.6); border-color:rgba(255,255,255,.25); }

#recg { display:flex; gap:3px; flex-wrap:wrap; }
.rc {
  width:20px; height:20px; border-radius:2px; cursor:pointer;
  border:1px solid rgba(255,255,255,.06); transition:transform .12s;
}
.rc:hover { transform:scale(1.1); }

#pinfo { margin-top:auto; padding:.7rem; font-size:.53rem; color:rgba(255,255,255,.1); letter-spacing:.07em; border-top:1px solid rgba(255,255,255,.04); line-height:1.9; }

@media(max-width:560px){ #panel{display:none;} #tools{width:34px;} .t{width:26px;height:26px;} }
</style>
</head>
<body>

<div id="bar">
  <span class="bar-logo">pixel</span>
  <div class="bdiv"></div>
  <button class="bb2" onclick="undo()">↩</button>
  <button class="bb2" onclick="redo()">↪</button>
  <div class="bdiv"></div>
  <button class="bb2 on" id="gbtn" onclick="toggleGrid()">grid</button>
  <button class="bb2" onclick="clearCanvas()">clear</button>
  <button class="bex bml" onclick="exportPNG()">export png</button>
</div>

<div id="layout">
  <div id="tools">
    <button class="t on" data-tool="pen"        onclick="setTool('pen')"        data-tip="Lápiz  P">✏</button>
    <button class="t"    data-tool="eraser"     onclick="setTool('eraser')"     data-tip="Borrador  E">◻</button>
    <button class="t"    data-tool="fill"       onclick="setTool('fill')"       data-tip="Relleno  F">◈</button>
    <button class="t"    data-tool="eyedropper" onclick="setTool('eyedropper')" data-tip="Cuentagotas  I">◉</button>
    <div class="tdiv"></div>
    <button class="t"    data-tool="line"       onclick="setTool('line')"       data-tip="Línea  L">╲</button>
    <button class="t"    data-tool="rect"       onclick="setTool('rect')"       data-tip="Rect  R">▭</button>
    <button class="t"    data-tool="ellipse"    onclick="setTool('ellipse')"    data-tip="Elipse  O">◯</button>
    <div class="tdiv"></div>
    <button class="t" onclick="flipH()"        data-tip="Voltear H">↔</button>
    <button class="t" onclick="flipV()"        data-tip="Voltear V">↕</button>
    <button class="t" onclick="rotateCanvas()" data-tip="Rotar 90°">↻</button>
  </div>

  <div id="area">
    <div id="wrap">
      <canvas id="px"></canvas>
      <canvas id="gv"></canvas>
    </div>
    <div id="zhud">
      <button class="zb" onclick="chZoom(-1)">−</button>
      <span id="zlbl">×16</span>
      <button class="zb" onclick="chZoom(1)">+</button>
    </div>
    <div id="coord">0, 0</div>
  </div>

  <div id="panel">
    <div class="ps">
      <div class="pl">Color</div>
      <div id="col-box" onclick="document.getElementById('native').click()"></div>
      <input id="hexinp" type="text" value="#c8c8e8" maxlength="7" oninput="onHex(this.value)">
      <input id="native" type="color" value="#c8c8e8" oninput="onNative(this.value)">
    </div>
    <div class="ps">
      <div class="pl">Opacidad</div>
      <input type="range" id="opslider" min="1" max="100" value="100" oninput="onOp(this.value)">
    </div>
    <div class="ps">
      <div class="pl">Paleta</div>
      <div id="palg"></div>
    </div>
    <div class="ps">
      <div class="pl">Pincel</div>
      <div id="brushg">
        <button class="bsz on" data-s="1" onclick="setBrush(1)">1</button>
        <button class="bsz"    data-s="2" onclick="setBrush(2)">2</button>
        <button class="bsz"    data-s="3" onclick="setBrush(3)">3</button>
        <button class="bsz"    data-s="5" onclick="setBrush(5)">5</button>
      </div>
    </div>
    <div class="ps">
      <div class="pl">Canvas</div>
      <div id="sizes">
        <button class="csz on" data-s="16" onclick="newCanvas(16)">16</button>
        <button class="csz"    data-s="32" onclick="newCanvas(32)">32</button>
        <button class="csz"    data-s="48" onclick="newCanvas(48)">48</button>
        <button class="csz"    data-s="64" onclick="newCanvas(64)">64</button>
      </div>
    </div>
    <div class="ps">
      <div class="pl">Recientes</div>
      <div id="recg"></div>
    </div>
    <div id="pinfo">by Álvaro Zambianchi<br>P E F I · L R O<br>ctrl+z · ctrl+y</div>
  </div>
</div>

<script>
let G=16,Z=20,tool='pen',color='#c8c8e8',opacity=1,brush=1;
let drawing=false,lastCell=null,shapeStart=null,shapePrev=null;
let undoStack=[],redoStack=[],recent=[],gridOn=true;
const px=document.getElementById('px'),ctx=px.getContext('2d');
const gv=document.getElementById('gv'),gx=gv.getContext('2d');

const PAL=['#0d0d14','#1c1c2e','#2e2e4a','#3d3d60','#6666a0','#9999cc','#e8e8f8','#ffffff','#ff4455','#ff8844','#ffcc33','#44ff88','#4488ff','#bb44ff','#44ffcc','#ff44aa','#88ffdd','#ffaa44','#4466ff','#ffee44','#66ff44','#ff4466','#44aaff','#aa44ff'];

function buildPal(){const g=document.getElementById('palg');g.innerHTML='';PAL.forEach(c=>{const d=document.createElement('div');d.className='pc';d.style.background=c;if(c===color)d.classList.add('sel');d.onclick=()=>setColor(c);g.appendChild(d);});}

function setColor(h){color=h;updateCUI(h);addRec(h);document.querySelectorAll('.pc').forEach(p=>p.classList.toggle('sel',r2h(p.style.background)===h));}
function updateCUI(h){document.getElementById('col-box').style.background=h;document.getElementById('hexinp').value=h;document.getElementById('native').value=h;}
function onHex(v){if(/^#[0-9a-fA-F]{6}$/.test(v)){color=v;document.getElementById('col-box').style.background=v;document.getElementById('native').value=v;addRec(v);}}
function onNative(v){color=v;updateCUI(v);addRec(v);}
function onOp(v){opacity=v/100;}
function addRec(h){recent=recent.filter(c=>c!==h);recent.unshift(h);if(recent.length>10)recent.pop();renderRec();}
function renderRec(){const g=document.getElementById('recg');g.innerHTML='';recent.forEach(c=>{const d=document.createElement('div');d.className='rc';d.style.background=c;d.onclick=()=>setColor(c);g.appendChild(d);});}

function calcZ(){const a=document.getElementById('area');Z=Math.max(4,Math.min(Math.floor((a.clientWidth-40)/G),Math.floor((a.clientHeight-40)/G),48));}
function applySize(){calcZ();px.width=G;px.height=G;px.style.width=(G*Z)+'px';px.style.height=(G*Z)+'px';gv.width=G*Z;gv.height=G*Z;gv.style.width=(G*Z)+'px';gv.style.height=(G*Z)+'px';drawGrid();updZ();}
function newCanvas(s){if(undoStack.length&&!confirm('¿Nuevo canvas? Se perderá el trabajo.'))return;G=s;ctx.clearRect(0,0,G,G);undoStack=[];redoStack=[];applySize();document.querySelectorAll('.csz').forEach(b=>b.classList.toggle('on',+b.dataset.s===s));}

function drawGrid(){gx.clearRect(0,0,gv.width,gv.height);if(!gridOn)return;gx.strokeStyle='rgba(255,255,255,.055)';gx.lineWidth=.5;for(let i=0;i<=G;i++){gx.beginPath();gx.moveTo(i*Z,0);gx.lineTo(i*Z,G*Z);gx.stroke();gx.beginPath();gx.moveTo(0,i*Z);gx.lineTo(G*Z,i*Z);gx.stroke();}}
function toggleGrid(){gridOn=!gridOn;document.getElementById('gbtn').classList.toggle('on',gridOn);drawGrid();}

function setTool(t){tool=t;document.querySelectorAll('.t[data-tool]').forEach(b=>b.classList.toggle('on',b.dataset.tool===t));}
function setBrush(s){brush=s;document.querySelectorAll('.bsz').forEach(b=>b.classList.toggle('on',+b.dataset.s===s));}
function getC(){if(opacity>=1)return color;const r=parseInt(color.slice(1,3),16),g=parseInt(color.slice(3,5),16),b=parseInt(color.slice(5,7),16);return`rgba(${r},${g},${b},${opacity})`;}

function getCell(e){const r=px.getBoundingClientRect(),sx=G/r.width,sy=G/r.height,cx=e.touches?e.touches[0].clientX:e.clientX,cy=e.touches?e.touches[0].clientY:e.clientY;return{x:Math.max(0,Math.min(G-1,Math.floor((cx-r.left)*sx))),y:Math.max(0,Math.min(G-1,Math.floor((cy-r.top)*sy)))};}

function drawPx(x,y,c,s){s=s||brush;const h=Math.floor(s/2);ctx.fillStyle=c;for(let dx=-h;dx<s-h;dx++)for(let dy=-h;dy<s-h;dy++){const px2=x+dx,py2=y+dy;if(px2>=0&&px2<G&&py2>=0&&py2<G)ctx.fillRect(px2,py2,1,1);}}
function erasePx(x,y,s){s=s||brush;const h=Math.floor(s/2);for(let dx=-h;dx<s-h;dx++)for(let dy=-h;dy<s-h;dy++){const px2=x+dx,py2=y+dy;if(px2>=0&&px2<G&&py2>=0&&py2<G)ctx.clearRect(px2,py2,1,1);}}

function fill(sx,sy,fc){const id=ctx.getImageData(0,0,G,G),d=id.data,idx=(x,y)=>(y*G+x)*4,ti=idx(sx,sy),tr=d[ti],tg=d[ti+1],tb=d[ti+2],ta=d[ti+3];const tmp=document.createElement('canvas');tmp.width=tmp.height=1;const tc=tmp.getContext('2d');tc.fillStyle=fc;tc.fillRect(0,0,1,1);const fd=tc.getImageData(0,0,1,1).data,fr=fd[0],fg=fd[1],fb=fd[2],fa=fd[3];if(tr===fr&&tg===fg&&tb===fb&&ta===fa)return;const stack=[[sx,sy]],vis=new Uint8Array(G*G);while(stack.length){const[x,y]=stack.pop();if(x<0||x>=G||y<0||y>=G||vis[y*G+x])continue;const i2=idx(x,y);if(d[i2]!==tr||d[i2+1]!==tg||d[i2+2]!==tb||d[i2+3]!==ta)continue;vis[y*G+x]=1;d[i2]=fr;d[i2+1]=fg;d[i2+2]=fb;d[i2+3]=fa;stack.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]);}ctx.putImageData(id,0,0);}

function pick(x,y){const d=ctx.getImageData(x,y,1,1).data;if(d[3]===0)return;setColor('#'+[d[0],d[1],d[2]].map(v=>v.toString(16).padStart(2,'0')).join(''));}
function drawLine(x0,y0,x1,y1,c){let dx=Math.abs(x1-x0),sx=x0<x1?1:-1,dy=-Math.abs(y1-y0),sy=y0<y1?1:-1,err=dx+dy;ctx.fillStyle=c;while(true){ctx.fillRect(x0,y0,1,1);if(x0===x1&&y0===y1)break;const e2=2*err;if(e2>=dy){err+=dy;x0+=sx;}if(e2<=dx){err+=dx;y0+=sy;}}}
function drawRect(x0,y0,x1,y1,c){const[minx,maxx]=[Math.min(x0,x1),Math.max(x0,x1)],[miny,maxy]=[Math.min(y0,y1),Math.max(y0,y1)];ctx.fillStyle=c;for(let x=minx;x<=maxx;x++){ctx.fillRect(x,miny,1,1);ctx.fillRect(x,maxy,1,1);}for(let y=miny;y<=maxy;y++){ctx.fillRect(minx,y,1,1);ctx.fillRect(maxx,y,1,1);}}
function drawEllipse(cx,cy,rx,ry,c){ctx.fillStyle=c;const pts=new Set();for(let t=0;t<360;t+=.5){const r=t*Math.PI/180;pts.add(`${Math.round(cx+rx*Math.cos(r))},${Math.round(cy+ry*Math.sin(r))}`);}pts.forEach(p=>{const[x,y]=p.split(',').map(Number);if(x>=0&&x<G&&y>=0&&y<G)ctx.fillRect(x,y,1,1);});}

function save(){undoStack.push(ctx.getImageData(0,0,G,G));if(undoStack.length>60)undoStack.shift();redoStack=[];}
function undo(){if(!undoStack.length)return;redoStack.push(ctx.getImageData(0,0,G,G));ctx.putImageData(undoStack.pop(),0,0);}
function redo(){if(!redoStack.length)return;undoStack.push(ctx.getImageData(0,0,G,G));ctx.putImageData(redoStack.pop(),0,0);}

function flipH(){save();const t=document.createElement('canvas');t.width=t.height=G;const c=t.getContext('2d');c.scale(-1,1);c.drawImage(px,-G,0);ctx.clearRect(0,0,G,G);ctx.drawImage(t,0,0);}
function flipV(){save();const t=document.createElement('canvas');t.width=t.height=G;const c=t.getContext('2d');c.scale(1,-1);c.drawImage(px,0,-G);ctx.clearRect(0,0,G,G);ctx.drawImage(t,0,0);}
function rotateCanvas(){save();const t=document.createElement('canvas');t.width=t.height=G;const c=t.getContext('2d');c.translate(G/2,G/2);c.rotate(Math.PI/2);c.drawImage(px,-G/2,-G/2);ctx.clearRect(0,0,G,G);ctx.drawImage(t,0,0);}
function clearCanvas(){save();ctx.clearRect(0,0,G,G);}
function exportPNG(){const s=Math.max(4,Math.floor(512/G)),o=document.createElement('canvas');o.width=G*s;o.height=G*s;const c=o.getContext('2d');c.imageSmoothingEnabled=false;c.drawImage(px,0,0,G*s,G*s);const a=document.createElement('a');a.download='pixel.png';a.href=o.toDataURL();a.click();}

function chZoom(d){const s=[4,6,8,10,12,14,16,20,24,28,32,40,48],i=s.indexOf(Z),n=Math.max(0,Math.min(s.length-1,i+d));Z=s[n];px.style.width=(G*Z)+'px';px.style.height=(G*Z)+'px';gv.width=G*Z;gv.height=G*Z;gv.style.width=(G*Z)+'px';gv.style.height=(G*Z)+'px';drawGrid();updZ();}
function updZ(){document.getElementById('zlbl').textContent='×'+Z;}

const wrap=document.getElementById('wrap');
wrap.addEventListener('mousedown',e=>{e.preventDefault();onDown(e);});
wrap.addEventListener('mousemove',e=>{onMove(e);});
wrap.addEventListener('mouseup',e=>{onUp(e);});
wrap.addEventListener('mouseleave',e=>{onUp(e);});
wrap.addEventListener('touchstart',e=>{e.preventDefault();onDown(e);},{passive:false});
wrap.addEventListener('touchmove',e=>{e.preventDefault();onMove(e);},{passive:false});
wrap.addEventListener('touchend',e=>{onUp(e);});
document.getElementById('area').addEventListener('wheel',e=>{e.preventDefault();chZoom(e.deltaY<0?1:-1);},{passive:false});
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  const k=e.key.toLowerCase();
  if((e.ctrlKey||e.metaKey)&&k==='z'){e.preventDefault();undo();return;}
  if((e.ctrlKey||e.metaKey)&&k==='y'){e.preventDefault();redo();return;}
  if(k==='p')setTool('pen');if(k==='e')setTool('eraser');if(k==='f')setTool('fill');
  if(k==='i')setTool('eyedropper');if(k==='l')setTool('line');if(k==='r')setTool('rect');
  if(k==='o')setTool('ellipse');if(k==='g')toggleGrid();if(k==='[')chZoom(-1);if(k===']')chZoom(1);
});

function onDown(e){drawing=true;save();const c=getCell(e);lastCell=c;if(tool==='eyedropper'){pick(c.x,c.y);drawing=false;return;}if(tool==='fill'){fill(c.x,c.y,getC());drawing=false;return;}if(['line','rect','ellipse'].includes(tool)){shapeStart=c;shapePrev=ctx.getImageData(0,0,G,G);return;}if(tool==='pen')drawPx(c.x,c.y,getC());if(tool==='eraser')erasePx(c.x,c.y);}
function onMove(e){const c=getCell(e);document.getElementById('coord').textContent=`${c.x}, ${c.y}`;if(!drawing)return;if(['line','rect','ellipse'].includes(tool)&&shapeStart){ctx.putImageData(shapePrev,0,0);const cl=getC();if(tool==='line')drawLine(shapeStart.x,shapeStart.y,c.x,c.y,cl);if(tool==='rect')drawRect(shapeStart.x,shapeStart.y,c.x,c.y,cl);if(tool==='ellipse'){const cx2=Math.round((shapeStart.x+c.x)/2),cy2=Math.round((shapeStart.y+c.y)/2);drawEllipse(cx2,cy2,Math.abs(c.x-shapeStart.x)/2,Math.abs(c.y-shapeStart.y)/2,cl);}return;}if(lastCell&&(lastCell.x!==c.x||lastCell.y!==c.y)){const dx=c.x-lastCell.x,dy=c.y-lastCell.y,steps=Math.max(Math.abs(dx),Math.abs(dy));for(let s=0;s<=steps;s++){const ix=Math.round(lastCell.x+dx*(s/steps)),iy=Math.round(lastCell.y+dy*(s/steps));if(tool==='pen')drawPx(ix,iy,getC());if(tool==='eraser')erasePx(ix,iy);}}lastCell=c;}
function onUp(e){if(!drawing)return;drawing=false;if(['line','rect','ellipse'].includes(tool)&&shapeStart){const c=getCell(e);ctx.putImageData(shapePrev,0,0);const cl=getC();if(tool==='line')drawLine(shapeStart.x,shapeStart.y,c.x,c.y,cl);if(tool==='rect')drawRect(shapeStart.x,shapeStart.y,c.x,c.y,cl);if(tool==='ellipse'){const cx2=Math.round((shapeStart.x+c.x)/2),cy2=Math.round((shapeStart.y+c.y)/2);drawEllipse(cx2,cy2,Math.abs(c.x-shapeStart.x)/2,Math.abs(c.y-shapeStart.y)/2,cl);}shapeStart=null;shapePrev=null;}lastCell=null;}

function r2h(rgb){if(rgb.startsWith('#'))return rgb;const m=rgb.match(/\d+/g);if(!m)return'#000000';return'#'+m.slice(0,3).map(v=>parseInt(v).toString(16).padStart(2,'0')).join('');}

buildPal();applySize();updateCUI(color);setColor(color);
</script>
